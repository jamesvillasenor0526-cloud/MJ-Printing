<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Purchase - MJ Print Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/store.js?v=11"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#E11D2E',
                            hover: '#C51626',
                            light: '#FDE8EA',
                            dark: '#0B0B0F',
                            red: '#E11D2E'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        [x-cloak] {
            display: none !important;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen" x-data="ordersApp()">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50" x-data="{ open: false }">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 sm:h-24">
                <a href="index.html" class="flex items-center group">
                    <img src="images/logo.png" alt="MJ Print Advertisement" class="h-14 sm:h-20 w-auto" />
                </a>

                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-gray-500 hover:text-brand font-medium">Home</a>
                    <a href="about.html" class="text-gray-500 hover:text-brand font-medium">About</a>
                    <a href="index.html#services" class="text-gray-500 hover:text-brand font-medium">Services</a>

                    <!-- Dynamic Auth Link with Dropdown -->
                    <template x-if="$store.auth.isLoggedIn">
                        <div class="relative" x-data="{ dropdownOpen: false }">
                            <button @click="dropdownOpen = !dropdownOpen" @click.outside="dropdownOpen = false"
                                class="flex items-center text-gray-500 hover:text-brand font-medium focus:outline-none">
                                <div class="flex items-center space-x-2">
                                    <template x-if="$store.auth.user.profilePicture">
                                        <img :src="$store.auth.user.profilePicture"
                                            class="w-8 h-8 rounded-full object-cover border border-gray-200"
                                            onerror="this.onerror=null; this.src='images/default-avatar.png';">
                                    </template>
                                    <template x-if="!$store.auth.user.profilePicture">
                                        <div class="w-8 h-8 rounded-full bg-brand text-white flex items-center justify-center font-bold text-sm"
                                            x-text="$store.auth.user.name.charAt(0)"></div>
                                    </template>
                                    <span class="ml-2 font-medium" x-text="$store.auth.user.name.split(' ')[0]"></span>
                                </div>
                                <svg class="w-4 h-4 ml-1 transition-transform" :class="dropdownOpen ? 'rotate-180' : ''"
                                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M19 9l-7 7-7-7"></path>
                                </svg>
                            </button>

                            <!-- Dropdown Menu -->
                            <div x-show="dropdownOpen" x-transition:enter="transition ease-out duration-200"
                                x-transition:enter-start="opacity-0 translate-y-1"
                                x-transition:enter-end="opacity-100 translate-y-0"
                                x-transition:leave="transition ease-in duration-150"
                                x-transition:leave-start="opacity-100 translate-y-0"
                                x-transition:leave-end="opacity-0 translate-y-1"
                                class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg ring-1 ring-black/5 py-2 z-50"
                                style="display: none;">
                                <a href="profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">My
                                    Account</a>
                                <a href="orders.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">My
                                    Purchase</a>
                                <div class="border-t border-gray-100 my-1"></div>
                                <button @click="$store.auth.logout()"
                                    class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-50">Logout</button>
                            </div>
                        </div>
                    </template>

                    <a href="cart.html" class="relative group">
                        <svg class="w-7 h-7 text-gray-400 group-hover:text-brand transition-colors" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z">
                            </path>
                        </svg>
                        <span x-text="$store.cart.count"
                            class="absolute -top-2 -right-2 bg-brand-red text-white text-[10px] font-bold rounded-full h-4 w-4 flex items-center justify-center">0</span>
                    </a>

                    <!-- Login/Register (Only if not logged in) -->
                    <template x-if="!$store.auth.isLoggedIn">
                        <a href="login.html"
                            class="text-xs font-semibold text-brand border border-brand px-3 py-1 rounded-full hover:bg-brand hover:text-white transition-colors">Sign
                            In</a>
                    </template>
                </div>

                <div class="flex items-center md:hidden">
                    <button @click="open = !open" class="text-gray-500 hover:text-gray-900 p-2">
                        <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div x-show="open" class="md:hidden bg-white border-t border-gray-100 shadow-xl" x-transition>
            <div class="px-4 pt-2 pb-4 space-y-2">
                <a href="index.html"
                    class="block px-4 py-3 text-base font-medium text-gray-500 hover:bg-gray-50 hover:text-brand">Home</a>
                <a href="about.html"
                    class="block px-4 py-3 text-base font-medium text-gray-500 hover:bg-gray-50 hover:text-brand">About</a>
                <a href="index.html#services"
                    class="block px-4 py-3 text-base font-medium text-gray-500 hover:bg-gray-50 hover:text-brand">Services</a>
                <a href="track.html"
                    class="block px-4 py-3 text-base font-medium text-gray-500 hover:bg-gray-50 hover:text-brand">Track
                    Order</a>
                <a href="cart.html"
                    class="block px-4 py-3 text-base font-medium text-gray-500 hover:bg-gray-50 hover:text-brand">Cart
                    (<span x-text="$store.cart.count">0</span>)</a>

                <!-- Mobile Auth Links with Dropdown -->
                <template x-if="$store.auth.isLoggedIn">
                    <div class="border-t border-gray-100 mt-2 pt-2">
                        <div class="px-4 py-2 flex items-center space-x-3">
                            <template x-if="$store.auth.user.profilePicture">
                                <img :src="$store.auth.user.profilePicture"
                                    class="w-8 h-8 rounded-full object-cover border border-gray-200"
                                    onerror="this.onerror=null; this.src='images/default-avatar.png';">
                            </template>
                            <template x-if="!$store.auth.user.profilePicture">
                                <div class="w-8 h-8 rounded-full bg-brand text-white flex items-center justify-center font-bold text-sm"
                                    x-text="$store.auth.user.name.charAt(0)"></div>
                            </template>
                            <span class="text-sm font-bold text-gray-700" x-text="$store.auth.user.name"></span>
                        </div>
                        <a href="profile.html"
                            class="block px-4 py-2 text-base font-medium text-gray-500 hover:bg-gray-50 hover:text-brand">My
                            Account</a>
                        <a href="orders.html"
                            class="block px-4 py-2 text-base font-medium text-gray-500 hover:bg-gray-50 hover:text-brand">My
                            Purchase</a>
                        <button @click="$store.auth.logout()"
                            class="w-full text-left block px-4 py-2 text-base font-medium text-red-600 hover:bg-gray-50">Logout</button>
                    </div>
                </template>
                <template x-if="!$store.auth.isLoggedIn">
                    <a href="login.html"
                        class="block px-4 py-3 text-base font-bold text-center text-brand border-t border-gray-100 mt-2">Sign
                        In</a>
                </template>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <div class="mb-6">
            <h1 class="text-3xl font-bold text-gray-900">My Purchase</h1>
            <p class="text-gray-500 mt-1">View and manage your orders</p>
        </div>

        <!-- Order Filter Tabs -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100">
                <div class="flex space-x-1 border-b border-gray-200">
                    <button @click="orderFilter = 'active'"
                        :class="orderFilter === 'active' ? 'border-b-2 border-brand text-brand font-semibold' : 'text-gray-500 hover:text-gray-700'"
                        class="px-4 py-2 text-sm transition-colors">
                        Active (<span x-text="activeOrders.length"></span>)
                    </button>
                    <button @click="orderFilter = 'completed'"
                        :class="orderFilter === 'completed' ? 'border-b-2 border-brand text-brand font-semibold' : 'text-gray-500 hover:text-gray-700'"
                        class="px-4 py-2 text-sm transition-colors">
                        Completed (<span x-text="completedOrders.length"></span>)
                    </button>
                    <button @click="orderFilter = 'cancelled'"
                        :class="orderFilter === 'cancelled' ? 'border-b-2 border-brand text-brand font-semibold' : 'text-gray-500 hover:text-gray-700'"
                        class="px-4 py-2 text-sm transition-colors">
                        Cancelled (<span x-text="cancelledOrders.length"></span>)
                    </button>
                </div>
            </div>

            <!-- Empty State -->
            <div x-show="filteredOrders.length === 0" class="p-8 text-center" x-cloak>
                <svg class="mx-auto h-12 w-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
                <h3 class="mt-2 text-sm font-medium text-gray-900"
                    x-text="orderFilter === 'active' ? 'No active orders' : orderFilter === 'completed' ? 'No completed orders' : 'No cancelled orders'">
                </h3>
                <p class="mt-1 text-sm text-gray-500" x-show="orderFilter === 'active'">Start by creating a new
                    design quote.</p>
                <div class="mt-6" x-show="orderFilter === 'active'">
                    <a href="index.html"
                        class="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-brand hover:bg-brand-hover focus:outline-none">
                        Browse Products
                    </a>
                </div>
            </div>

            <!-- Orders List -->
            <ul x-show="filteredOrders.length > 0" class="divide-y divide-gray-100" x-cloak>
                <template x-for="order in filteredOrders" :key="order.id || order._id">
                    <li class="p-6 hover:bg-gray-50">
                        <div class="flex items-center justify-between">
                            <div class="flex-1">
                                <div class="flex items-center justify-between mb-2">
                                    <p class="text-sm font-bold text-brand"
                                        x-text="'Order #' + (order.referenceId || order._id)"></p>
                                    <p class="text-sm text-gray-500" x-text="formatDate(order.date)"></p>
                                </div>
                                <div class="mt-2 sm:flex sm:justify-between">
                                    <div class="sm:flex">
                                        <p class="flex items-center text-sm text-gray-500">
                                            <svg class="flex-shrink-0 mr-1.5 h-5 w-5 text-gray-400"
                                                xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                                                fill="currentColor">
                                                <path fill-rule="evenodd"
                                                    d="M10 2a4 4 0 00-4 4v1H5a1 1 0 00-.994.89l-1 9A1 1 0 004 18h12a1 1 0 001-1.11l-1-9A1 1 0 0015 7h-1V6a4 4 0 00-4-4zm2 5V6a2 2 0 10-4 0v1h4zm-6 3a1 1 0 112 0 1 1 0 01-2 0zm7-1a1 1 0 100 2 1 1 0 000-2z"
                                                    clip-rule="evenodd" />
                                            </svg>
                                            <span x-text="order.items.map(i => i.name).join(', ')"></span>
                                        </p>
                                    </div>
                                    <div class="mt-2 flex items-center text-sm text-gray-500 sm:mt-0">
                                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                                            :class="{
                                                'bg-yellow-100 text-yellow-800': order.status === 'Pending',
                                                'bg-blue-100 text-blue-800': order.status === 'Processing' || order.status === 'In Production',
                                                'bg-green-100 text-green-800': order.status === 'Ready',
                                                'bg-gray-100 text-gray-800': order.status === 'Completed',
                                                'bg-red-100 text-red-800': order.status === 'Cancelled'
                                            }" x-text="order.status">
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <div class="ml-5 flex-shrink-0 flex items-center gap-3">
                                <template x-if="order.status === 'Pending'">
                                    <button @click="cancelOrder(order.id || order._id)"
                                        class="text-sm font-medium text-red-600 hover:text-red-800 underline">
                                        Cancel
                                    </button>
                                </template>
                                <template x-if="order.status === 'Completed' && !order.isReviewed">
                                    <button @click="openReviewModal(order)"
                                        class="text-sm font-bold text-brand hover:text-brand-hover">
                                        Write Review
                                    </button>
                                </template>
                                <template x-if="order.status !== 'Cancelled'">
                                    <a :href="'track.html?ref=' + (order.referenceId || order._id)"
                                        class="font-medium text-brand hover:text-brand-hover">Track
                                        &rarr;</a>
                                </template>
                            </div>
                        </div>
                    </li>
                </template>
            </ul>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 border-t border-gray-800 mt-auto">
        <div class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
            <div class="flex justify-center">
                <img src="images/logo.png" alt="MJ Print Advertisement" class="h-8 w-auto" />
            </div>
            <div class="mt-4 flex justify-center space-x-6">
                <a href="file-guide.html" class="text-gray-400 hover:text-white transition-colors">File Guide</a>
                <span class="text-gray-600">|</span>
                <a href="faq.html" class="text-gray-400 hover:text-white transition-colors">FAQ</a>
                <span class="text-gray-600">|</span>
                <span class="text-base text-gray-400">
                    &copy; 2026 MJ Print Services. All rights reserved.
                </span>
            </div>
        </div>
    </footer>

    <!-- Review Modal -->
    <div x-show="showReviewModal" class="fixed inset-0 z-50 overflow-y-auto" x-cloak>
        <div class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 transition-opacity" aria-hidden="true" @click="showReviewModal = false">
                <div class="absolute inset-0 bg-gray-500 opacity-75"></div>
            </div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div
                class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
                <form @submit.prevent="submitReview">
                    <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                        <div class="sm:flex sm:items-start">
                            <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left w-full">
                                <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4">Write a Review</h3>
                                <div class="space-y-4">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700">Rating</label>
                                        <div class="flex items-center mt-1 space-x-1">
                                            <template x-for="i in 5">
                                                <button type="button" @click="reviewForm.rating = i"
                                                    class="focus:outline-none">
                                                    <svg class="w-8 h-8 transition-colors"
                                                        :class="i <= reviewForm.rating ? 'text-yellow-400 fill-current' : 'text-gray-300 fill-current'"
                                                        viewBox="0 0 20 20">
                                                        <path
                                                            d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                                    </svg>
                                                </button>
                                            </template>
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700">Review</label>
                                        <textarea x-model="reviewForm.text" required rows="3" maxlength="500"
                                            class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-brand focus:border-brand sm:text-sm"></textarea>
                                    </div>
                                    <!-- Image Upload -->
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700">Upload Image
                                            (optional)</label>
                                        <div
                                            class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-md">
                                            <div class="space-y-1 text-center">
                                                <template x-if="!reviewForm.imagePreview">
                                                    <div>
                                                        <svg class="mx-auto h-12 w-12 text-gray-400"
                                                            stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                                            <path
                                                                d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02"
                                                                stroke-width="2" stroke-linecap="round"
                                                                stroke-linejoin="round" />
                                                        </svg>
                                                        <div class="flex text-sm text-gray-600 justify-center">
                                                            <label for="review-image-upload"
                                                                class="relative cursor-pointer bg-white rounded-md font-medium text-brand hover:text-brand-hover focus-within:outline-none">
                                                                <span>Upload a file</span>
                                                                <input id="review-image-upload"
                                                                    name="review-image-upload" type="file"
                                                                    accept="image/*" class="sr-only"
                                                                    @change="handleImageUpload($event)">
                                                            </label>
                                                            <p class="pl-1">or drag and drop</p>
                                                        </div>
                                                        <p class="text-xs text-gray-500">PNG, JPG, GIF up to 5MB</p>
                                                    </div>
                                                </template>
                                                <template x-if="reviewForm.imagePreview">
                                                    <div class="relative">
                                                        <img :src="reviewForm.imagePreview" alt="Preview"
                                                            class="mx-auto h-32 w-32 object-cover rounded">
                                                        <button type="button"
                                                            @click="reviewForm.imageFile = null; reviewForm.imagePreview = null"
                                                            class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1">
                                                            <svg class="w-4 h-4" fill="none" stroke="currentColor"
                                                                viewBox="0 0 24 24">
                                                                <path stroke-linecap="round" stroke-linejoin="round"
                                                                    stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                                            </svg>
                                                        </button>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                    <!-- Video Upload -->
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700">Upload Video
                                            (optional)</label>
                                        <div
                                            class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-md">
                                            <div class="space-y-1 text-center">
                                                <template x-if="!reviewForm.videoPreview">
                                                    <div>
                                                        <svg class="mx-auto h-12 w-12 text-gray-400"
                                                            stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                                            <path d="M14.5 4.5l15 7-15 7V4.5z" stroke-width="2"
                                                                stroke-linecap="round" stroke-linejoin="round" />
                                                            <path d="M14.5 4.5l15 7-15 7V4.5z" stroke="none"
                                                                fill="currentColor" opacity="0.3" />
                                                        </svg>
                                                        <div class="flex text-sm text-gray-600 justify-center">
                                                            <label for="review-video-upload"
                                                                class="relative cursor-pointer bg-white rounded-md font-medium text-brand hover:text-brand-hover focus-within:outline-none">
                                                                <span>Upload a video</span>
                                                                <input id="review-video-upload"
                                                                    name="review-video-upload" type="file"
                                                                    accept="video/*" class="sr-only"
                                                                    @change="handleVideoUpload($event)">
                                                            </label>
                                                        </div>
                                                        <p class="text-xs text-gray-500">MP4, WebM, MOV up to 50MB</p>
                                                    </div>
                                                </template>
                                                <template x-if="reviewForm.videoPreview">
                                                    <div class="relative">
                                                        <video :src="reviewForm.videoPreview"
                                                            class="mx-auto h-32 w-32 object-cover rounded"
                                                            controls></video>
                                                        <button type="button"
                                                            @click="reviewForm.videoFile = null; reviewForm.videoPreview = null"
                                                            class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1">
                                                            <svg class="w-4 h-4" fill="none" stroke="currentColor"
                                                                viewBox="0 0 24 24">
                                                                <path stroke-linecap="round" stroke-linejoin="round"
                                                                    stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                                            </svg>
                                                        </button>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                        <button type="submit"
                            class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-brand text-base font-medium text-white hover:bg-brand-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand sm:ml-3 sm:w-auto sm:text-sm">
                            Submit Review
                        </button>
                        <button type="button" @click="showReviewModal = false"
                            class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        function ordersApp() {
            return {
                myOrders: [],
                orderFilter: 'active',
                showReviewModal: false,
                selectedOrder: null,
                reviewForm: {
                    rating: 5,
                    text: '',
                    imageFile: null,
                    imagePreview: null,
                    videoFile: null,
                    videoPreview: null
                },

                async init() {
                    // Check authentication
                    if (typeof AuthAPI === 'undefined' || !AuthAPI.isAuthenticated()) {
                        window.location.href = 'login.html';
                        return;
                    }

                    try {
                        await this.loadOrders();
                    } catch (error) {
                        console.error('Failed to load orders:', error);
                        if (error.message && error.message.includes('401')) {
                            AuthAPI.logout();
                            window.location.href = 'login.html';
                        }
                    }
                },

                async loadOrders() {
                    try {
                        this.myOrders = await OrdersAPI.getUserOrders();

                        // Check which orders already have reviews
                        const reviews = await ReviewsAPI.getAll();

                        // Mark orders that already have reviews
                        this.myOrders.forEach(order => {
                            const orderId = String(order._id);
                            const hasReview = reviews.some(r => {
                                // Handle different review order formats - compare as strings
                                const reviewOrderId = r.order?._id || r.order;
                                return reviewOrderId && String(reviewOrderId) === orderId;
                            });
                            order.isReviewed = hasReview;
                        });
                    } catch (error) {
                        console.error('Error loading orders:', error);
                        this.myOrders = [];
                    }
                },

                get filteredOrders() {
                    if (this.orderFilter === 'active') {
                        return this.activeOrders;
                    } else if (this.orderFilter === 'completed') {
                        return this.completedOrders;
                    } else {
                        return this.cancelledOrders;
                    }
                },

                get activeOrders() {
                    return this.myOrders.filter(o => o.status !== 'Completed' && o.status !== 'Cancelled');
                },

                get completedOrders() {
                    return this.myOrders.filter(o => o.status === 'Completed');
                },

                get cancelledOrders() {
                    return this.myOrders.filter(o => o.status === 'Cancelled');
                },

                formatDate(date) {
                    if (!date) return '';
                    const d = new Date(date);
                    return d.toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric'
                    });
                },

                async cancelOrder(orderId) {
                    if (!confirm('Are you sure you want to cancel this order?')) return;

                    try {
                        await OrdersAPI.cancel(orderId);
                        await this.loadOrders();
                        alert('Order cancelled successfully');
                    } catch (error) {
                        alert(error.message || 'Failed to cancel order');
                    }
                },

                openReviewModal(order) {
                    this.selectedOrder = order;
                    this.reviewForm = {
                        rating: 5,
                        text: '',
                        imageFile: null,
                        imagePreview: null,
                        videoFile: null,
                        videoPreview: null
                    };
                    this.showReviewModal = true;
                },

                handleImageUpload(event) {
                    const file = event.target.files[0];
                    if (!file) return;

                    if (!file.type.startsWith('image/')) {
                        alert('Please select an image file');
                        return;
                    }

                    if (file.size > 5 * 1024 * 1024) {
                        alert('File size must be less than 5MB');
                        return;
                    }

                    this.reviewForm.imageFile = file;

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.reviewForm.imagePreview = e.target.result;
                    };
                    reader.readAsDataURL(file);
                },

                handleVideoUpload(event) {
                    const file = event.target.files[0];
                    if (!file) return;

                    if (!file.type.startsWith('video/')) {
                        alert('Please select a video file');
                        return;
                    }

                    if (file.size > 50 * 1024 * 1024) {
                        alert('File size must be less than 50MB');
                        return;
                    }

                    this.reviewForm.videoFile = file;

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.reviewForm.videoPreview = e.target.result;
                    };
                    reader.readAsDataURL(file);
                },

                async submitReview() {
                    if (!this.reviewForm.text.trim()) {
                        alert('Please write a review');
                        return;
                    }

                    try {
                        await ReviewsAPI.create(
                            this.reviewForm.rating,
                            this.reviewForm.text,
                            this.selectedOrder.id || this.selectedOrder._id,
                            this.reviewForm.imageFile,
                            this.reviewForm.videoFile
                        );

                        // Mark order as reviewed
                        this.selectedOrder.isReviewed = true;
                        this.showReviewModal = false;
                        alert('Review submitted successfully!');
                    } catch (error) {
                        alert(error.message || 'Failed to submit review');
                    }
                }
            }
        }
    </script>
</body>

</html>
